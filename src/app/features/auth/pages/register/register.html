<section class="df-page df-auth">
  <div class="df-card df-auth-card">
    <h1 class="df-title" style="text-align:center">Crear Cuenta</h1>
    <p class="df-muted df-auth-sub">Regístrate para gestionar tus listas de libros.</p>

    @if (errorMsg()) {
      <div class="df-alert">{{ errorMsg() }}</div>
    }
    @if (successMsg()) {
      <div class="df-alert df-alert-success">{{ successMsg() }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="df-field">
        <label class="df-label" for="nombres">Nombres</label>
        <input id="nombres" name="nombres" class="df-input" type="text"
               [(ngModel)]="nombres" placeholder="Tus nombres" required />
      </div>
      <div class="df-field">
        <label class="df-label" for="apellidos">Apellidos</label>
        <input id="apellidos" name="apellidos" class="df-input" type="text"
               [(ngModel)]="apellidos" placeholder="Tus apellidos" required />
      </div>
      <div class="df-field">
        <label class="df-label" for="email">Correo</label>
        <input id="email" name="email" class="df-input" type="email"
               [(ngModel)]="email" placeholder="tucorreo@ejemplo.com" required />
      </div>
      <div class="df-field">
        <label class="df-label" for="password">Contraseña</label>
        <input id="password" name="password" class="df-input" type="password"
               [(ngModel)]="password" placeholder="Mínimo 6 caracteres" required />
      </div>
      <button class="df-btn df-btn-primary df-block" type="submit" [disabled]="loading()">
        {{ loading() ? 'Registrando...' : 'Crear Cuenta' }}
      </button>
    </form>

    <p class="df-muted" style="text-align:center; margin-top:1rem">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</section>
