<section class="df-page df-auth">
  <div class="df-card df-auth-card">
    <h1 class="df-title" style="text-align:center">Iniciar Sesión</h1>
    <p class="df-muted df-auth-sub">Accede para gestionar tus listas de libros.</p>

    @if (errorMsg()) {
      <div class="df-alert">{{ errorMsg() }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="df-field">
        <label class="df-label" for="email">Correo</label>
        <input id="email" name="email" class="df-input" type="email"
               [(ngModel)]="email" placeholder="tucorreo@ejemplo.com" required />
      </div>
      <div class="df-field">
        <label class="df-label" for="password">Contraseña</label>
        <input id="password" name="password" class="df-input" type="password"
               [(ngModel)]="password" required />
      </div>
      <button class="df-btn df-btn-primary df-block" type="submit" [disabled]="loading()">
        {{ loading() ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>
  </div>
</section>
